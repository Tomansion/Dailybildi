version: "3.8"

services:
  arangodb:
    image: arangodb:3.11
    container_name: dailybildi-arangodb
    ports:
      - "8529:8529"
    environment:
      - ARANGO_ROOT_PASSWORD=devpassword
    volumes:
      - arangodb_data:/var/lib/arangodb3
      - arangodb_apps:/var/lib/arangodb3-apps
    restart: unless-stopped
    networks:
      - dailybildi-network

networks:
  dailybildi-network:
    driver: bridge

volumes:
  arangodb_data:
    driver: local
  arangodb_apps:
    driver: local
